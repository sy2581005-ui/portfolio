<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Contact Section</title>
    <link rel="stylesheet" href="style copy.css" />
  </head>
  <body>
    <section class="contact-section">
      <div class="contact-header">
        <div class="nav-arrows">
          <a href="index.html"><button class="arrow-btn">&lt;</button></a>

          <button class="arrow-btn">&gt;</button>
        </div>
        <h2>Get In <span class="highlight">Touch</span></h2>
        <p>We Got you covered</p>
      </div>

      <div class="contact-container">
        <div class="contact-image">
          <img src="./images/image.jpg" alt="Character working at desk" />
        </div>

        <div class="contact-form-container">
          <form
            class="contact-form"
            action="https://formspree.io/f/mjgzzngk"
            method="post"
          >
            <div class="form-row">
              <label>
                <input
                  type="text"
                  name="firstName"
                  placeholder="First Name"
                  required
                />
              </label>

              <label>
                <input
                  type="text"
                  name="lastName"
                  placeholder="Last Name"
                  required
                />
              </label>
            </div>

            <label>
              <input
                type="email"
                name="email"
                placeholder="Email Address"
                required
              />
            </label>

            <label>
              <input type="tel" name="phone" placeholder="Phone Number" />
            </label>

            <label>
              <textarea
                name="Discribe your work."
                placeholder="Discribe your work. "
                rows="8"
                required
              ></textarea>
            </label>
            <button type="submit" class="submit-btn">Send message</button>
          </form>
        </div>
      </div>
    </section>
  </body>
</html>
